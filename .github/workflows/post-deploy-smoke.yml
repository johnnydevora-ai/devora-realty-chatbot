# .github/workflows/post-deploy-smoke.yml
# Two jobs:
#   test        - install deps, run guardrails, jest, next build (every push/PR)
#   live-smoke  - POST /api/dalton after every successful Production
#                 deployment_status event from Vercel, expect 200


name: post-deploy-smoke


on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  deployment_status:


permissions:
  contents: read


jobs:
  test:
    if: github.event_name != 'deployment_status'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Guardrails (check:api-exports)
        run: npm run check:api-exports
      - name: Run tests
        run: npm test -- --ci
      - name: Build sanity check
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
  live-smoke:
    if: github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'Production'
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/dalton and expect 200
        run: |
          set -euo pipefail
          URL="${{ github.event.deployment_status.target_url }}/api/dalton"
          echo "Testing $URL"
          code=$(curl -sS -o /tmp/body -w "%{http_code}" -X POST "$URL" -H "Content-Type: application/json" -d '{"message":"3 bed house in East Austin under 750k"}')
          echo "HTTP $code"
          echo "--- body ---"
          cat /tmp/body || true
          echo
          test "$code" = "200"

